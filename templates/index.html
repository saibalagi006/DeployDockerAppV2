<!DOCTYPE html>
<html>
<head>
    <title>South Indian Food Menu</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <h1>South Indian Food Menu</h1>
    <ul>
        {% for item in menu %}
        <li>
            <h2>{{ item.name }}</h2>
            <p>Ingredients: {{ item.ingredients | join(', ') }}</p>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
